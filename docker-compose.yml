services:

  # ─── The Brain (Ollama) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: atlas_brain
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always
    # M1 Tip: Ollama handles Metal acceleration natively in Docker Desktop 4.19+

  # ─── The Back Office (Django Settings) ────────────────────────────────────
  settings-panel:
    image: python:3.11-slim
    container_name: atlas_settings
    ports:
      - "8010:8000"
    volumes:
      - ./django-smallstack:/app
    working_dir: /app
    environment:
      - DEBUG=1
      - DATABASE_URL=sqlite:///db.sqlite3
    command: >
      sh -c "pip install -r requirements.txt &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ─── The Bridge (MCP Server) ───────────────────────────────────────────────
  # @modelcontextprotocol/server-ollama is not yet published on npm.
  # Container stays alive on port 3000; replace command when the package lands.
  mcp-server:
    image: node:20-slim
    container_name: atlas_bridge
    ports:
      - "3000:3000"
    volumes:
      - ./mcp-config:/app/config
    command: sh -c "echo '[atlas_bridge] MCP placeholder — awaiting @modelcontextprotocol/server-ollama' && tail -f /dev/null"

  # ─── The Hands (OpenClaw Agent) ────────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: atlas_agent
    depends_on:
      - ollama
      - mcp-server
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MCP_SERVER_URL=http://mcp-server:3000
    volumes:
      - ~/Library/Mobile\ Documents/com~apple~CloudDocs/Active_2025_2026:/data/archives

volumes:
  ollama_data:
