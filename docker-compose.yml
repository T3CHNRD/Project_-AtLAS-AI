services:

  # ─── The Brain ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: atlas_brain
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  # ─── The Back Office (Settings Panel) ──────────────────────────────────────
  settings-panel:
    image: python:3.11-slim
    container_name: atlas_settings
    ports:
      - "8010:8000"
    volumes:
      - ./django-smallstack:/app
    working_dir: /app
    command: >
      sh -c "pip install -r requirements.txt &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    depends_on:
      - ollama

  # ─── The Bridge (MCP / Model Context Protocol) ──────────────────────────────
  mcp-server:
    image: node:20-slim
    container_name: atlas_bridge
    ports:
      - "3000:3000"
    volumes:
      - ./mcp-config:/app/config
    command: npx @modelcontextprotocol/server-ollama --host ollama --port 11434
    restart: unless-stopped
    depends_on:
      - ollama

  # ─── The Hands (Autonomous Agent) ──────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: atlas_agent
    depends_on:
      - ollama
      - mcp-server
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MCP_SERVER_URL=http://mcp-server:3000
    volumes:
      - ~/Library/Mobile\ Documents/com~apple~CloudDocs/Active_2025_2026:/data/archives
    restart: unless-stopped

volumes:
  ollama_data:
